    <!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="/frontend/style.css">

</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/frontend/bloglogo.png"  alt="Logo">
        </div>
          
        <nav class="nav">
        <ul>
            <li><a class="nav_link" href="/frontend/index.html">Home</a></li>
            <li><a class="nav_button" href="/frontend/login.html">Login</a></li>
        </ul>
        </nav>
    </header>
    <main>
        <center>
            <form id="register" method="post">
            <h2>Register</h2>
            <input type="text" id="username" name="username" placeholder="Username" required><br><br>
            <input type="email" id="email" name="email" placeholder="Email" required><br><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <input type="submit" value="Register">
        </form>
        <p>Already have an account? <a href="/frontend/login.html">Login here</a></p>
    
    
    
    </center>
    </main>
    <script src="/frontend/register.js"></script>
</body>
</html>
